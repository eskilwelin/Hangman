
<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui); background: transparent; color: var(--color-text-primary); }

  .screen { display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; gap: 20px; }

  .title { font-size: 22px; font-weight: 500; letter-spacing: 0.5px; }
  .subtitle { font-size: 13px; color: var(--color-text-secondary); }

  .difficulty-row { display: flex; gap: 8px; }
  .diff-btn {
    padding: 6px 18px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-transform: capitalize;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent; color: var(--color-text-primary);
  }
  .diff-btn.active {
    border: 1.5px solid var(--color-text-primary);
    background: var(--color-text-primary);
    color: var(--color-background-primary);
  }

  .start-btn {
    padding: 10px 32px; border-radius: 8px; border: none;
    background: var(--color-text-primary); color: var(--color-background-primary);
    font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .start-btn:hover { opacity: 0.85; }
  .start-btn:disabled { opacity: 0.4; cursor: default; }

  .error-msg { font-size: 13px; color: var(--color-text-danger); text-align: center; max-width: 320px; }

  .game-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }

  .hangman-svg { display: block; margin: 0 auto; }

  .hangman-part {
    stroke: var(--color-text-primary);
    stroke-linecap: round;
    transition: opacity 0.4s ease, stroke-dashoffset 0.4s ease;
    fill: none;
  }
  .hangman-part.hidden { opacity: 0; }
  .hangman-part.visible { opacity: 1; }

  .lives-row { display: flex; align-items: center; gap: 6px; }
  .heart { font-size: 14px; }
  .lives-text { font-size: 13px; color: var(--color-text-secondary); }

  .word-display { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; min-height: 48px; }
  .letter-slot {
    min-width: 28px; height: 44px; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; padding-bottom: 4px;
    border-bottom: 2px solid var(--color-border-primary);
  }
  .letter-slot .letter { font-size: 20px; font-weight: 500; text-transform: uppercase; line-height: 1; }
  .letter-slot.correct .letter { color: var(--color-text-success); }
  .letter-slot.revealed .letter { color: var(--color-text-danger); }

  .keyboard { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .kb-row { display: flex; gap: 5px; }
  .kb-key {
    width: 36px; height: 40px; border-radius: 6px; font-size: 13px; font-weight: 500;
    text-transform: uppercase; cursor: pointer; transition: all 0.1s;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
  }
  .kb-key:hover:not(:disabled) { background: var(--color-background-secondary); }
  .kb-key:active:not(:disabled) { transform: scale(0.95); }
  .kb-key:disabled { opacity: 0.25; cursor: default; }
  .kb-key.wrong { border-color: var(--color-border-danger); color: var(--color-text-danger); }

  .result-box { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .result-label { font-size: 20px; font-weight: 500; }
  .result-label.won { color: var(--color-text-success); }
  .result-label.lost { color: var(--color-text-danger); }
  .result-word { font-size: 13px; color: var(--color-text-secondary); }
  .result-word strong { color: var(--color-text-primary); }

  .play-again-btn {
    padding: 8px 22px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    border: 0.5px solid var(--color-border-secondary);
    background: transparent; color: var(--color-text-primary);
  }
  .play-again-btn:hover { background: var(--color-background-secondary); }
</style>
</head>
<body>

<div id="root" class="screen"></div>

<script>
const API_BASE = "http://localhost:5000";

let state = {
  screen: 'menu',
  difficulty: 'medium',
  gameId: null,
  display: [],
  lives: 6,
  guessedLetters: [],
  status: 'ongoing',
  revealedWord: null,
  loading: false,
  error: null,
};

const KEYBOARD_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['z','x','c','v','b','n','m'],
];

function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';

  const title = el('h2', { class: 'title' }, 'Hangman');
  root.appendChild(title);

  if (state.screen === 'menu') renderMenu(root);
  else renderGame(root);
}

function renderMenu(root) {
  const sub = el('p', { class: 'subtitle' }, 'Choose your difficulty');
  root.appendChild(sub);

  const row = el('div', { class: 'difficulty-row' });
  ['easy','medium','hard'].forEach(d => {
    const btn = el('button', { class: 'diff-btn' + (state.difficulty === d ? ' active' : '') }, d);
    btn.onclick = () => { state.difficulty = d; render(); };
    row.appendChild(btn);
  });
  root.appendChild(row);

  const startBtn = el('button', { class: 'start-btn' }, state.loading ? 'Starting…' : 'Start game');
  if (state.loading) startBtn.disabled = true;
  startBtn.onclick = startGame;
  root.appendChild(startBtn);

  if (state.error) {
    root.appendChild(el('p', { class: 'error-msg' }, state.error));
  }
}

function renderGame(root) {
  const game = el('div', { class: 'game-area' });

  game.appendChild(buildHangmanSVG(state.lives));

  const livesRow = el('div', { class: 'lives-row' });
  for (let i = 0; i < 6; i++) {
    const dot = el('span', { style: `width:8px;height:8px;border-radius:50%;display:inline-block;background:${i < state.lives ? 'var(--color-text-primary)' : 'var(--color-border-tertiary)'}` });
    livesRow.appendChild(dot);
  }
  const livesText = el('span', { class: 'lives-text' }, `${state.lives} ${state.lives === 1 ? 'life' : 'lives'} left`);
  livesRow.appendChild(livesText);
  game.appendChild(livesRow);

  const wordDisplay = el('div', { class: 'word-display' });
  const letters = state.status !== 'ongoing' && state.revealedWord
    ? state.revealedWord.split('')
    : state.display;

  letters.forEach((ch, i) => {
    const slot = el('div', { class: 'letter-slot' });
    if (ch !== '_') {
      const isNew = state.status !== 'ongoing';
      const wasGuessed = state.display[i] !== '_';
      slot.classList.add(wasGuessed || state.status === 'won' ? 'correct' : 'revealed');
      slot.appendChild(el('span', { class: 'letter' }, ch));
    }
    wordDisplay.appendChild(slot);
  });
  game.appendChild(wordDisplay);

  if (state.status !== 'ongoing') {
    const box = el('div', { class: 'result-box' });
    const label = el('p', { class: 'result-label ' + state.status },
      state.status === 'won' ? 'You won!' : 'Game over');
    box.appendChild(label);
    if (state.status === 'lost' && state.revealedWord) {
      const wordEl = el('p', { class: 'result-word' });
      wordEl.innerHTML = `The word was: <strong>${state.revealedWord}</strong>`;
      box.appendChild(wordEl);
    }
    const again = el('button', { class: 'play-again-btn' }, 'Play again');
    again.onclick = () => { state = { ...state, screen: 'menu', gameId: null, error: null }; render(); };
    box.appendChild(again);
    game.appendChild(box);
  } else {
    game.appendChild(buildKeyboard());
  }

  root.appendChild(game);
}

function buildHangmanSVG(lives) {
  const wrongGuesses = 6 - lives;
  const svg = svgEl('svg', {
    viewBox: '0 0 200 200',
    width: '180',
    height: '180',
    class: 'hangman-svg',
    'aria-label': `Hangman figure with ${wrongGuesses} wrong guesses`,
  });

  const gallow = [
    ['line', { x1:20, y1:195, x2:180, y2:195, 'stroke-width':3 }],
    ['line', { x1:55, y1:195, x2:55, y2:15, 'stroke-width':3 }],
    ['line', { x1:55, y1:15, x2:125, y2:15, 'stroke-width':3 }],
    ['line', { x1:125, y1:15, x2:125, y2:38, 'stroke-width':2 }],
  ];
  gallow.forEach(([tag, attrs]) => {
    const g = svgEl(tag, { ...attrs, stroke: 'var(--color-text-primary)', 'stroke-linecap': 'round', fill: 'none' });
    svg.appendChild(g);
  });

  const parts = [
    () => { const c = svgEl('circle', { cx:125, cy:53, r:15, 'stroke-width':2 }); return c; },
    () => svgEl('line', { x1:125, y1:68, x2:125, y2:120, 'stroke-width':2 }),
    () => svgEl('line', { x1:125, y1:82, x2:100, y2:107, 'stroke-width':2 }),
    () => svgEl('line', { x1:125, y1:82, x2:150, y2:107, 'stroke-width':2 }),
    () => svgEl('line', { x1:125, y1:120, x2:100, y2:155, 'stroke-width':2 }),
    () => svgEl('line', { x1:125, y1:120, x2:150, y2:155, 'stroke-width':2 }),
  ];

  parts.forEach((buildPart, i) => {
    const part = buildPart();
    const visible = i < wrongGuesses;
    part.setAttribute('stroke', 'var(--color-text-primary)');
    part.setAttribute('stroke-linecap', 'round');
    part.setAttribute('fill', 'none');
    part.style.opacity = visible ? '1' : '0';
    part.style.transition = 'opacity 0.35s ease';
    svg.appendChild(part);
  });

  return svg;
}

function buildKeyboard() {
  const kb = el('div', { class: 'keyboard' });
  KEYBOARD_ROWS.forEach(row => {
    const rowEl = el('div', { class: 'kb-row' });
    row.forEach(letter => {
      const guessed = state.guessedLetters.includes(letter);
      const isWrong = guessed && !state.display.includes(letter) && state.display.join('') !== state.revealedWord;
      const btn = el('button', { class: 'kb-key' + (isWrong ? ' wrong' : '') }, letter);
      if (guessed) btn.disabled = true;
      btn.onclick = () => submitGuess(letter);
      rowEl.appendChild(btn);
    });
    kb.appendChild(rowEl);
  });
  return kb;
}

async function startGame() {
  state.loading = true;
  state.error = null;
  render();
  try {
    const res = await fetch(`${API_BASE}/api/new_game`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ difficulty: state.difficulty }),
    });
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    state = {
      ...state,
      screen: 'game',
      gameId: data.game_id,
      display: data.display,
      lives: data.lives,
      guessedLetters: data.guessed_letters,
      status: data.status,
      revealedWord: null,
      loading: false,
    };
  } catch (e) {
    state.loading = false;
    state.error = 'Could not connect — make sure Flask is running on localhost:5000.';
  }
  render();
}

async function submitGuess(letter) {
  if (!state.gameId || state.status !== 'ongoing') return;
  if (state.guessedLetters.includes(letter)) return;

  state.guessedLetters = [...state.guessedLetters, letter];
  render();

  try {
    const res = await fetch(`${API_BASE}/api/guess`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game_id: state.gameId, letter }),
    });
    const data = await res.json();

    if (data.status === 'won' || data.status === 'lost') {
      state.status = data.status;
      state.revealedWord = data.word;
      if (data.status === 'won') {
        state.display = data.word.split('');
      }
    } else if (data.display) {
      state.display = data.display;
      state.lives = data.lives;
      state.guessedLetters = data.guessed_letters;
      state.status = data.status;
    }
  } catch {
    state.guessedLetters = state.guessedLetters.filter(l => l !== letter);
  }
  render();
}

function el(tag, attrs = {}, text = null) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else e.setAttribute(k, v);
  });
  if (text !== null) e.textContent = text;
  return e;
}

function svgEl(tag, attrs = {}) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => e.setAttribute(k, v));
  return e;
}

document.addEventListener('keydown', (e) => {
  if (state.screen !== 'game' || state.status !== 'ongoing') return;
  if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    submitGuess(e.key.toLowerCase());
  }
});

render();
</script>
</body>
</html>
